<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="culturama-favico.png">
    <title>Pesquisa culturama</title>
</head>

<body>
    <header>
        <img src="img/logo-culturama.png" alt="logo-culturama">
        <h1>Pesquisa Online</h1>
    </header>
    <section>
        <form action="#" method="get">
            <fieldset>
                <legend class="dados-pessoais">Dados Pessoais</legend>
                <label for="name">Nome</label>
                <input type="text" name="userName" id="name">
                <br>
                <label for="age">Idade</label>
                <input type="number" name="userAge" id="age" min="12" max="100" required>
                <br>
                <label for="birthDate">Data de nascimento</label>
                <input type="date" name="userBirthDate" id="birthDate">
                <br>
                <label for="email">E-mail</label>
                <input type="email" name="userEmail" id="email" required>
                <br>
                <label for="phoneNumber">Telefone</label>
                <input type="tel" name="userPhoneNumber" id="phoneNumber" pattern="[0-9]{11}"
                    placeholder="DDD + número sem espaços ou hífen">
                <br>
                <label for="image">Upload de foto</label>
                <input type="file" accept="image/*" name="userImage" id="image">
                <br>
            </fieldset>

            <fieldset>
                <legend class="perfil">Perfil</legend>

                <p>Gênero</p>
                <input type="radio" name="userGender" value="feminino" id="fem">
                <label for="fem">Feminino</label>
                <br>
                <input type="radio" name="userGender" value="masculino" id="masc">
                <label for="masc">Masculino</label>
                <br>
                <input type="radio" name="userGender" value="notInformed" id="notInformed">
                <label for="notInformed">Prefiro não informar</label>
                <br>

                <label for="maritalStatus">Estado civil:</label>
                <select id="maritalStatus" name="userMaritalStatus">
                    <option value="notInformed">Selecione...</option>
                    <option value="casado">Casado</option>
                    <option value="solteiro">Solteiro</option>
                    <option value="divorciado">Divorciado</option>
                    <option value="uniaoEstavel">União estável</option>
                </select>


                <label for="state">Estado: </label>
                <select id="state" name="userStates" required>
                    <option value="notInformed">Selecione...</option>
                    <option value="acre">Acre</option>
                    <option value="alagoas">Alagoas</option>
                    <option value="amapa">Amapá</option>
                    <option value="amazonas">Amazonas</option>
                    <option value="bahia">Bahia</option>
                    <option value="ceara">Ceará</option>
                    <option value="distritoFederal">Distrito Federal</option>
                    <option value="espiritoSanto">Espirito Santo</option>
                    <option value="goias">Goiás</option>
                    <option value="maranhao">Maranhão</option>
                    <option value="matoGrossoDoSul">Mato Grosso do Sul</option>
                    <option value="matoGrosso">Mato Grosso</option>
                    <option value="minasGerais">Minas Gerais</option>
                    <option value="para">Pará</option>
                    <option value="paraiba">Paraíba</option>
                    <option value="parana">Paraná</option>
                    <option value="pernambuco">Pernambuco</option>
                    <option value="piaua">Piauí</option>
                    <option value="rioDeJaneiro">Rio de Janeiro</option>
                    <option value="rioGrandeDoNorte">Rio Grande do Norte</option>e
                    <option value="rioGrandeDoSul">Rio Grande do Sul</option>
                    <option value="rondonia">Rondônia</option>
                    <option value="roraima">Roraima</option>
                    <option value="santaCatarina">Santa Catarina</option>
                    <option value="saoPaulo">São Paulo</option>
                    <option value="sergipe">Sergipe</option>
                    <option value="tocantins">Tocantins</option>
                </select>
                <br>

                <label for="city">Cidade</label>
                <input id="city" type="text" name="userCity">
            </fieldset>

            <fieldset>
                <legend>Hábitos</legend>
                <p>Redes Sociais:</p>
                <input id="instagram" type="checkbox" name="social" value="instagram">
                <label for="instagram">Instagram</label>
                <br>
                <input id="facebook" type="checkbox" name="social" value="facebook">
                <label for="facebook">Facebook</label>
                <br>
                <input id="linkedin" type="checkbox" name="social" value="linkedin">
                <label for="linkedin">Linkedin</label>
                <br>
                <input id="x" type="checkbox" name="social" value="x">
                <label for="x">X</label>
                <br>

                <label for="musicStyle">Estilo musical</label>
                <input list="styleTypes" type="text" id="musicStyle" name="userMusicStyle">
                <datalist id="styleTypes">
                    <option value="Rock">
                    <option value="Eletrônica">
                    <option value="Sertanejo">
                    <option value="Trap">
                    <option value="Hip Hop">
                </datalist>
                <br>

                <label for="favoriteColor">Cor Favorita</label>
                <input type="color" name="userFavorityColor" id="favoriteColor">
            </fieldset>

            <fieldset>
                <legend>Opinião</legend>
                <p>O que você acha da qualidade do nosso serviços?</p>

                <input type="radio" name="userServiceOpinion" id="otimo" value="otima">
                <label for="otimo">Òtima</label>
                <br>

                <input type="radio" name="userServiceOpinion" id="boa" value="boa">
                <label for="boa">Boa</label>
                <br>

                <input type="radio" name="userServiceOpinion" id="regular" value="regular">
                <label for="regular">Regular</label>
                <br>

                <input type="radio" name="userServiceOpinion" id="ruim" value="ruim">
                <label for="ruim">Ruim</label>
                <br>

                <label for="comment">Escreva sua opinião:</label>
                <textarea id="comment" name="userComment" placeholder="Digite aqui sua opinião..."></textarea>
            </fieldset>

            <fieldset>
                <legend>Confirmações</legend>

                <input type="checkbox" name="userLgpd" id="userLgpdTerm" value="acepted" required>
                <label for="userLgpd">Eu aceito participar da pesquisa</label>
                <br>

                <input type="checkbox" name="userGetResult" id="getResult" value="acepted">
                <label for="getResult">Desejo receber o resultado por e-mail</label>
            </fieldset>

            <button type="submit">Enviar</button>
            <button type="reset">Limpar</button>
        </form>
    </section>
</body>

</html>
